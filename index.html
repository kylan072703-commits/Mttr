<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platinum Tactical - Direct Mirror</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
</head>
<body class="bg-black text-gray-300 font-mono p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-black text-red-600 italic tracking-tighter">PLATINUM TACTICAL</h1>
            <p id="system-status" class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">Awaiting Signal...</p>
        </div>
        <div class="text-right text-[10px] font-bold">
            <p>MILESTONE: 1499/1500</p>
            <p class="text-blue-400">ORLANDO UNIT</p>
        </div>
    </div>

    <div class="relative w-full aspect-video bg-gray-950 rounded-3xl border-2 border-gray-900 overflow-hidden mb-6 shadow-[0_0_30px_rgba(255,0,0,0.1)]">
        <video id="mirrorFeed" autoplay playsinline muted class="w-full h-full object-cover opacity-60"></video>
        <div class="absolute top-4 left-4 flex items-center gap-2">
            <div id="live-dot" class="w-2.5 h-2.5 rounded-full bg-gray-700"></div>
            <span class="text-[9px] font-black uppercase tracking-widest">Live Link</span>
        </div>
    </div>

    <div class="space-y-4">
        <button id="mirrorBtn" onclick="initiateTacticalMirror()" 
            class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg active:scale-[0.98] transition-all border-b-4 border-blue-800">
            Connect Native Mirror
        </button>

        <button id="muteBtn" onclick="toggleMute()" 
            class="w-full bg-green-700 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest border-b-4 border-green-900">
            Voice Alert: ON 🔊
        </button>
    </div>

    <div id="log" class="mt-6 w-full bg-gray-900/50 p-4 rounded-2xl text-[10px] h-32 overflow-y-auto border border-gray-800/50 text-blue-100/60 leading-relaxed">
        > Standing by for production start...
    </div>

    <script>
        const API_KEY = 'AIzaSyCSCDEWdXQjl4G1VYp0AEtpby2cWWUtWd4';
        let isMuted = false;
        let video = document.getElementById('mirrorFeed');
        let canvas = document.createElement('canvas');

        // THE "FOCUS-LOCK" MIRROR LOGIC
        async function initiateTacticalMirror() {
            updateLog("Requesting System Permission...");
            
            // Standard constraints for iOS 2026 Safari
            const constraints = { 
                video: { 
                    displaySurface: "monitor",
                    logicalSurface: true
                } 
            };

            try {
                // This is the specific call that triggers the Apple popup
                const stream = await navigator.mediaDevices.getDisplayMedia(constraints);
                video.srcObject = stream;
                
                // UI Visuals
                document.getElementById('live-dot').classList.replace('bg-gray-700', 'bg-red-600');
                document.getElementById('live-dot').classList.add('animate-pulse');
                document.getElementById('system-status').innerText = "System Live";
                document.getElementById('system-status').classList.replace('text-gray-500', 'text-red-500');
                
                executeSpeech("Production online. Watching the set.");
                updateLog("Mirror established. Swipe to DoorDash.");

                // Start OCR Scanning every 3 seconds
                setInterval(runTacticalScan, 3000);

            } catch (err) {
                updateLog("PERMISSION DENIED: Ensure you are in a Regular Safari tab (not Private) and have 'Screen Capture' enabled in Advanced Settings.");
                console.error(err);
            }
        }

        async function runTacticalScan() {
            if (!video.srcObject) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                if (text.includes("$") || text.includes("mi")) {
                    processOffer(text);
                }
            } catch (e) { /* Skipping frame */ }
        }

        function processOffer(text) {
            // Logic for $ and miles extraction
            const payMatch = text.match(/\$(\d+\.\d+)/);
            const mileMatch = text.match(/(\d+\.\d+)\s*mi/);
            if (payMatch && mileMatch) {
                let pay = parseFloat(payMatch[1]);
                let miles = parseFloat(mileMatch[1]);
                // Speak verdict 5s/7s
                setTimeout(() => executeSpeech(pay/miles > 2 ? "Accept." : "Decline."), 5000);
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            btn.innerText = isMuted ? "Voice Alert: OFF 🔇" : "Voice Alert: ON 🔊";
            btn.classList.toggle('bg-green-700', !isMuted);
            btn.classList.toggle('bg-red-900', isMuted);
        }

        function executeSpeech(msg) {
            if (isMuted) return;
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
            updateLog(msg);
        }

        function updateLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
