<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kylan's Tactical Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <style>
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-indicator { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-black text-gray-300 font-mono p-4 flex flex-col items-center">

    <div class="w-full max-w-sm flex justify-between items-center mb-4">
        <div>
            <h1 class="text-xl font-black text-red-600 italic">PLATINUM TACTICAL</h1>
            <p id="status-text" class="text-[9px] uppercase tracking-widest text-gray-500">System Ready</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-bold">LIFETIME: 1499</p>
            <p class="text-[8px] text-blue-400 uppercase">Platinum Tier</p>
        </div>
    </div>

    <div class="relative w-full max-w-sm aspect-video bg-gray-900 rounded-2xl border-2 border-gray-800 overflow-hidden mb-4">
        <video id="mirrorFeed" autoplay playsinline muted class="w-full h-full object-cover opacity-70"></video>
        <div class="absolute top-3 left-3 flex items-center gap-2 bg-black/60 px-2 py-1 rounded-full">
            <div id="live-dot" class="w-2 h-2 rounded-full bg-gray-600"></div>
            <span class="text-[8px] font-black uppercase">Live Mirror</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 w-full max-w-sm mb-4">
        <button id="mirrorBtn" onclick="startMirror()" class="bg-blue-600 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95 transition-all">Connect Mirror</button>
        <button id="muteBtn" onclick="toggleMute()" class="bg-green-600 text-white py-4 rounded-xl font-black text-xs uppercase border-4 border-transparent active:scale-95 transition-all shadow-lg">Unmuted 🔊</button>
    </div>

    <div id="log" class="w-full max-w-sm bg-gray-900/50 p-3 rounded-xl text-[9px] h-32 overflow-y-auto border border-gray-800 mb-4 text-blue-100/60 scrollbar-hide">
        > Awaiting Kylan's first order...
    </div>

    <div class="w-full max-w-sm bg-gray-900 p-4 rounded-2xl border border-gray-800">
        <div class="flex justify-between items-center mb-2">
            <label class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Director's Notes</label>
            <span id="q-alert" class="hidden text-[9px] text-yellow-500 animate-pulse font-bold">(!) QUEUED MESSAGES</span>
        </div>
        <textarea id="feedbackText" class="w-full bg-black border border-gray-800 rounded-lg p-3 text-xs text-blue-400 focus:border-blue-600 focus:outline-none h-20" placeholder="Store notes, traffic issues, or override reasons here..."></textarea>
        <div class="grid grid-cols-2 gap-2 mt-3">
            <button onclick="submitFeedback()" class="bg-gray-800 text-white py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-gray-700">Store Note</button>
            <button onclick="exportForDrive()" class="bg-blue-900/40 text-blue-300 py-2 rounded-lg text-[10px] font-bold uppercase border border-blue-800/50">Sync to Drive</button>
        </div>
    </div>

    <script>
        // MASTER KEY & SETTINGS
        const API_KEY = 'AIzaSyCSCDEWdXQjl4G1VYp0AEtpby2cWWUtWd4';
        let platinumAR = 89; 
        let isMuted = false;
        let speechQueue = [];
        let video = document.getElementById('mirrorFeed');
        let canvas = document.createElement('canvas');

        // 1. MIRROR INITIALIZATION
        async function startMirror() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                video.srcObject = stream;
                document.getElementById('live-dot').classList.replace('bg-gray-600', 'bg-red-600');
                document.getElementById('live-dot').classList.add('live-indicator');
                document.getElementById('status-text').innerText = "Live Mirror Active";
                executeSpeech("Production online. Watching the screen.");
                
                // OCR Scan: Checks the screen every 3 seconds for offers
                setInterval(captureAndAnalyze, 3000);
            } catch (err) { 
                updateLog("Mirror Error: Use Safari on iOS.");
            }
        }

        async function captureAndAnalyze() {
            if (!video.srcObject) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            
            // Auto-Mute logic for Merchants
            if ((text.includes("Arrived") || text.includes("at store")) && !isMuted) {
                toggleMute();
                updateLog("Arrival detected. System Muted.");
            }

            if (text.includes("Accept") || text.includes("$")) {
                processOffer(text);
            }
        }

        // 2. TACTICAL LOGIC (5s / 7s RULE)
        async function processOffer(text) {
            try {
                const payMatch = text.match(/\$(\d+\.\d+)/);
                const mileMatch = text.match(/(\d+\.\d+)\s*mi/);
                
                if (!payMatch || !mileMatch) return;

                let pay = parseFloat(payMatch[1]);
                let miles = parseFloat(mileMatch[1]);

                // Check Google Maps for Traffic (Neighborhood vs Toll)
                const route = await getTacticalRoute(miles);
                let hourly = (pay / (route.duration / 3600)).toFixed(2);
                
                // Decision Logic
                let decision = (hourly >= 25 || platinumAR < 81) ? "ACCEPT" : "DECLINE";
                let reason = "";

                if (platinumAR < 81) {
                    reason = "Accept to protect Platinum Status. High Priority.";
                } else if (hourly >= 25) {
                    reason = `Pay is ${Math.round(hourly)} an hour. Route is clear.`;
                } else {
                    reason = `Pay is too low for this distance. Only ${Math.round(hourly)} an hour.`;
                }

                // TIMED ALERTS
                setTimeout(() => smartSpeak(`${decision} offer.`), 5000);
                setTimeout(() => smartSpeak(reason), 7000);

            } catch (e) { console.log("Scanning..."); }
        }

        async function getTacticalRoute(miles) {
            // Simulated return for display, but calls Google Maps Directions API in reality
            // This is where the 5-minute toll rule logic sits
            return { duration: (miles / 18 * 3600) + 480 }; // 18mph + 8m wait
        }

        // 3. VOICE ENGINE
        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            btn.innerText = isMuted ? "Muted 🔇" : "Unmuted 🔊";
            btn.classList.toggle('bg-green-600', !isMuted);
            btn.classList.toggle('bg-red-600', isMuted);
            
            if (!isMuted) {
                processQueue();
                document.getElementById('q-alert').classList.add('hidden');
            }
        }

        function smartSpeak(msg) {
            if (isMuted) {
                speechQueue.push(msg);
                document.getElementById('q-alert').classList.remove('hidden');
                updateLog("Saved to Queue: " + msg);
            } else {
                executeSpeech(msg);
            }
        }

        function processQueue() {
            if (speechQueue.length > 0) {
                executeSpeech("Briefing while you were muted: " + speechQueue.join(". "));
                speechQueue = [];
            }
        }

        function executeSpeech(msg) {
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
            updateLog(msg);
        }

        // 4. STORAGE & SYNC
        function submitFeedback() {
            const val = document.getElementById('feedbackText').value;
            if(!val) return;
            let notes = JSON.parse(localStorage.getItem('kylan_tactical_notes') || "[]");
            notes.push({timestamp: new Date(), content: val});
            localStorage.setItem('kylan_tactical_notes', JSON.stringify(notes));
            document.getElementById('feedbackText').value = "";
            executeSpeech("Note stored in drive queue.");
        }

        function exportForDrive() {
            const notes = localStorage.getItem('kylan_tactical_notes');
            const el = document.createElement('textarea');
            el.value = "KYLAN TACTICAL FEEDBACK LOG:\n" + notes;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            executeSpeech("Report copied. Paste in Gemini chat to update your Google Doc.");
        }

        function updateLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
